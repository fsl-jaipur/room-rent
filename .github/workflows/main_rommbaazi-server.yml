name: Build and deploy Node.js app to Azure Web App - rommbaazi-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'   # ✅ saves minutes
          cache-dependency-path: backend/package-lock.json

      - name: Install, build, test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present
        working-directory: backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_714C97068C7C4037B0058C54ECC7C96A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_53EE1794353A47AC8132B9332254F835 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6A5A383A4C7F44629D2C07C0663BCBAE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rommbaazi-server'
          slot-name: 'Production'
          package: .