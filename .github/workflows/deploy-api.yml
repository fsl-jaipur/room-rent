# GitHub Actions workflow for deploying API to Azure App Service
# Handles monorepo structure with shared workspace packages


name: Deploy Node.js Express API

on:
  push:
    branches:
      - Reactcode
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npm run prisma:generate
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBE43717B6C14EA69FA03AB605145364 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_37EB6F02C56646B4BF143A25D3BF65A8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B76E983A1BF4A9B8D0345FC5AE1431C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'roommate-identity'
          slot-name: 'Production'
          package: backend/