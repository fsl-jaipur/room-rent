# GitHub Actions workflow for deploying API to Azure App Service
# Handles monorepo structure with shared workspace packages

name: roommate-identity

on:
  push:
    branches:
      - AkshatLatest
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: '1.2.13'

    - name: Install workspace dependencies
      run: |
        echo "Installing dependencies from workspace root..."
        bun install --frozen-lockfile

    - name: Build shared packages
      run: |
        echo "Generating Prisma client..."
        bun run --filter=@rent/db prisma:generate
        echo "Building shared packages..."
        bun run build --filter=@rent/config
        bun run build --filter=@rent/db
        bun run build --filter=@rent/shared

    - name: Build API
      run: |
        echo "Building API application..."
        bun run build --filter=@rent/api

    - name: Create optimized deployment package
      run: |
        echo "Creating lightweight deployment package..."
        
        # Create a minimal deployment with just what's needed
        mkdir -p deploy/apps/api deploy/packages
        
        # Copy API source and built files
        cp -r apps/api/* deploy/apps/api/
        
        # Copy built packages (not source)
        cp -r packages/config/dist deploy/packages/config/ 2>/dev/null || cp -r packages/config deploy/packages/
        cp -r packages/db/dist deploy/packages/db/ 2>/dev/null || cp -r packages/db deploy/packages/
        cp -r packages/shared/dist deploy/packages/shared/ 2>/dev/null || cp -r packages/shared deploy/packages/
        
        # Copy essential workspace files
        cp package.json deploy/
        
        # Copy only essential node_modules dependencies
        mkdir -p deploy/node_modules
        cp -r node_modules/@prisma deploy/node_modules/ 2>/dev/null || true
        cp -r node_modules/.prisma deploy/node_modules/ 2>/dev/null || true
        cp -r node_modules/@rent deploy/node_modules/ 2>/dev/null || true
        
        echo "Package size:"
        du -sh deploy/ || echo "Size check failed"

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBE43717B6C14EA69FA03AB605145364 }}
        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_37EB6F02C56646B4BF143A25D3BF65A8 }}
        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B76E983A1BF4A9B8D0345FC5AE1431C }}

    - name: 'Deploy to Azure Web App'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'roommate-identity'
        slot-name: 'Production'
        package: './deploy'

    - name: Deployment complete
      run: |
        echo "✅ Deployment completed successfully!"
        echo "🚀 API available at: https://roommate-identity.azurewebsites.net"