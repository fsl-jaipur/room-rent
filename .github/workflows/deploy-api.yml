# GitHub Actions workflow for deploying API to Azure App Service
# Handles monorepo structure with shared workspace packages

name: roommate-identity

on:
  push:
    branches:
      - AkshatLatest
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.2.13'

      - name: Install dependencies and build
        run: |
          echo "Installing dependencies from workspace root..."
          bun install --frozen-lockfile
          echo "Generating Prisma client..."
          bun run --filter=@rent/db prisma:generate
          echo "Building shared packages..."
          bun run build --filter=@rent/config
          bun run build --filter=@rent/db
          bun run build --filter=@rent/shared
          echo "Building API application..."
          bun run build --filter=@rent/api

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBE43717B6C14EA69FA03AB605145364 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_37EB6F02C56646B4BF143A25D3BF65A8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B76E983A1BF4A9B8D0345FC5AE1431C }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'roommate-identity'
          slot-name: 'Production'
          package: .